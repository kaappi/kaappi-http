name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libssl-dev

      - name: Build Kaappi and kaappi-net
        run: |
          git clone --depth 1 https://github.com/kaappi/kaappi.git /tmp/kaappi
          cd /tmp/kaappi && zig build
          git clone --depth 1 https://github.com/kaappi/kaappi-net.git /tmp/kaappi-net
          cd /tmp/kaappi-net && make

      - name: Run offline tests
        run: /tmp/kaappi/zig-out/bin/kaappi --coverage-xml coverage.xml --lib-path lib --lib-path /tmp/kaappi-net/lib tests/test-parse.scm
        env:
          LD_LIBRARY_PATH: /tmp/kaappi-net
          DYLD_LIBRARY_PATH: /tmp/kaappi-net

      # Loopback-socket integration test. Bounded well above its normal
      # sub-second runtime: kaappi's own --timeout can't catch a hang here
      # (it's checked in the bytecode dispatch loop, so it can't interrupt
      # a blocked native accept()/recv() FFI call) — this step timeout is
      # the actual guard against that class of regression.
      - name: Run server tests
        timeout-minutes: 3
        run: /tmp/kaappi/zig-out/bin/kaappi --lib-path lib --lib-path /tmp/kaappi-net/lib tests/test-server.scm
        env:
          LD_LIBRARY_PATH: /tmp/kaappi-net
          DYLD_LIBRARY_PATH: /tmp/kaappi-net

      - name: Upload to Codecov
        if: github.event_name == 'push' && matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          files: coverage.xml
          fail_ci_if_error: false
